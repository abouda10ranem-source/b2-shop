<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - B2 Shop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card { max-width: 500px; }
    h1 { font-size: 6rem; color: #c9a84c; line-height: 1; margin-bottom: 10px; }
    h2 { font-size: 1.5rem; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 25px; }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: #c9a84c;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 500;
      transition: 0.3s;
    }
    a:hover { background: #e8c96e; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <h2>Page introuvable</h2>
    <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
