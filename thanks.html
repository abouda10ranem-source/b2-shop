<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci - B2 Shop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      max-width: 500px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #c9a84c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      font-size: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    h1 span { color: #c9a84c; }
    p { color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 25px; }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: #c9a84c;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 500;
      transition: 0.3s;
    }
    a:hover { background: #e8c96e; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Merci <span>!</span></h1>
    <p>Votre message a bien été envoyé.<br>Nous vous répondrons dans les plus brefs délais.</p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
